# Tool configuration only. Dependencies are in requirements.txt.

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501"]  # SQL strings in migrations exceed line length
"tests/*.py" = ["E501"]  # Supabase mock chains are inherently long

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (need local Supabase)",
]
