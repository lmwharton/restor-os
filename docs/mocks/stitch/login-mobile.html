<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
<!-- Background Decoration (Subtle Tonal Shapes) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-surface-container rounded-full blur-[120px] opacity-50"></div>
<div class="absolute -bottom-[5%] -right-[5%] w-[30%] h-[30%] bg-surface-dim rounded-full blur-[100px] opacity-40"></div>
</div>
<!-- Main Login Container -->
<main class="relative z-10 w-full max-w-[480px]">

<div class="bg-surface-container-lowest rounded-xl shadow-[0_16px_32px_-12px_rgba(31,27,23,0.05)] p-8 md:p-12 flex flex-col items-center">

<div class="flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="water_damage">water_damage</span>
<span class="text-[17px] font-semibold tracking-[-0.45px] lowercase text-on-surface">crewmatic</span>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="text-[28px] font-bold tracking-tight text-on-surface leading-tight mb-3">
                    Welcome Back
                </h1>
<p class="text-on-surface-variant/80 text-sm font-medium">
                    The Operating System for Restoration Contractors
                </p>
</div>
<!-- Sign In Action -->
<div class="w-full space-y-6">
<button class="w-full h-[56px] flex items-center justify-center gap-3 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-lg font-semibold shadow-sm active:scale-[0.98] transition-all duration-200">

<span>Sign in with Google</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/15"></div>
<span class="mono-data text-[10px] uppercase tracking-wider text-on-surface-variant/40 font-medium">Precision Field Access</span>
<div class="h-[1px] flex-1 bg-outline-variant/15"></div>
</div>
<div class="flex flex-col gap-4">
<div class="bg-surface-container-low p-4 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5" data-icon="shield">shield</span>
<div class="space-y-1">
<p class="text-xs font-semibold text-on-surface">Secure Contractor Portal</p>
<p class="text-[11px] text-on-surface-variant leading-relaxed">Encrypted sync for field readings and moisture maps.</p>
</div>
</div>
</div>

<a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and

</p>

</div>
