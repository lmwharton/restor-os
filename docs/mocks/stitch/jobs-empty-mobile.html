<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        body {
            font-family: 'Geist Sans', sans-serif;
        }
        .font-mono {
            font-family: 'Geist Mono', monospace;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed": "#380c00",
                        "primary": "#a63500",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#e1d8d2",
                        "on-error-container": "#93000a",
                        "tertiary": "#00628e",
                        "on-surface-variant": "#594139",
                        "inverse-primary": "#ffb59c",
                        "surface-container-highest": "#eae1da",
                        "secondary-fixed": "#ffdbcf",
                        "on-primary": "#ffffff",
                        "surface-container": "#f5ece6",
                        "tertiary-fixed-dim": "#8bceff",
                        "secondary-fixed-dim": "#ffb59c",
                        "on-surface": "#1f1b17",
                        "surface-container-high": "#f0e6e0",
                        "primary-fixed-dim": "#ffb59c",
                        "surface-container-low": "#fbf2eb",
                        "secondary-container": "#fea281",
                        "background": "#fff8f4",
                        "inverse-surface": "#34302b",
                        "surface": "#fff8f4",
                        "on-primary-fixed": "#380c00",
                        "on-tertiary-container": "#fcfcff",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#001e2f",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-background": "#1f1b17",
                        "secondary": "#924a30",
                        "on-secondary-fixed-variant": "#74341b",
                        "tertiary-fixed": "#c9e6ff",
                        "primary-fixed": "#ffdbcf",
                        "inverse-on-surface": "#f8efe8",
                        "on-primary-container": "#fffbff",
                        "on-primary-fixed-variant": "#822800",
                        "on-secondary-container": "#77361d",
                        "error": "#ba1a1a",
                        "surface-variant": "#eae1da",
                        "on-tertiary": "#ffffff",
                        "outline": "#8d7168",
                        "surface-tint": "#aa3700",
                        "outline-variant": "#e1bfb4",
                        "on-tertiary-fixed-variant": "#004b6f",
                        "tertiary-container": "#007cb3",
                        "primary-container": "#cc4911",
                        "surface-bright": "#fff8f4"
                    },
                    fontFamily: {
                        "headline": ["Geist Sans"],
                        "body": ["Geist Sans"],
                        "label": ["Geist Mono"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen selection:bg-secondary-container">
<!-- TopAppBar Component -->
<header class="bg-[#fff8f4]/80 dark:bg-[#1f1b17]/80 backdrop-blur-md sticky top-0 z-40 docked full-width shadow-[0_16px_32px_-12px_rgba(31,27,23,0.05)]">
<div class="flex justify-between items-center w-full px-6 h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#e85d26]" data-icon="water_damage">water_damage</span>
<h1 class="text-[17px] font-semibold tracking-[-0.45px] text-[#1f1b17] dark:text-[#fff8f4] lowercase">crewmatic</h1>
</div>
<div class="flex items-center gap-6">
<!-- Desktop Navigation Links integrated into Header -->
<nav class="hidden md:flex items-center gap-8">
<a class="text-[#e85d26] font-bold text-sm transition-colors active:scale-[0.98]" href="#">Jobs</a>
<a class="text-[#1f1b17] dark:text-[#fff8f4] hover:bg-[#fbf2eb] dark:hover:bg-[#3d362f] px-3 py-1 rounded transition-colors text-sm active:scale-[0.98]" href="#">Readings</a>
<a class="text-[#1f1b17] dark:text-[#fff8f4] hover:bg-[#fbf2eb] dark:hover:bg-[#3d362f] px-3 py-1 rounded transition-colors text-sm active:scale-[0.98]" href="#">Team</a>
<a class="text-[#1f1b17] dark:text-[#fff8f4] hover:bg-[#fbf2eb] dark:hover:bg-[#3d362f] px-3 py-1 rounded transition-colors text-sm active:scale-[0.98]" href="#">Settings</a>
</nav>
<div class="flex items-center gap-4 pl-6 border-l border-outline-variant/30">
<span class="hidden sm:block font-mono text-[11px] uppercase tracking-wider text-on-surface-variant">Ace Restoration</span>
<button class="text-xs font-semibold px-4 py-2 rounded-lg bg-surface-container-high text-on-surface hover:bg-[#fbf2eb] active:scale-[0.98] transition-all duration-200 ease-in-out">
                        Sign Out
                    </button>
</div>
</div>
</div>
</header>
<main class="relative flex flex-col items-center justify-center min-h-[calc(100vh-144px)] px-6 pb-20 overflow-hidden">
<!-- Abstract Background Shape for Depth -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="relative z-10 w-full max-w-md text-center">
<!-- Empty State Illustration/Icon -->
<div class="mb-10 inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-surface-container-low shadow-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-outline text-4xl" data-icon="assignment_late" style="font-variation-settings: 'FILL' 0;">assignment_late</span>
</div>
<h2 class="text-3xl md:text-4xl font-bold tracking-tight text-on-surface mb-4">No jobs yet.</h2>
<p class="text-on-surface-variant text-lg leading-relaxed mb-10 max-w-sm mx-auto">
                Create your first job to start AI scoping and real-time field data monitoring.
            </p>
<div class="flex flex-col items-center gap-4">
<button class="h-12 px-10 rounded-lg bg-gradient-to-br from-[#a63500] to-[#cc4911] text-white font-semibold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="add">add</span>
                    Create Job
                </button>
<!-- Secondary/Help Link -->
<button class="text-on-surface-variant hover:text-primary transition-colors text-sm font-medium flex items-center gap-1.5 px-4 py-2">
<span class="material-symbols-outlined text-base" data-icon="help_outline">help_outline</span>
                    How it works
                </button>
</div>
</div>
<!-- Technical Breadcrumb / State Info -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 hidden lg:block">
<div class="flex items-center gap-3 px-4 py-2 rounded-full bg-surface-container/50 backdrop-blur-sm border border-outline-variant/15">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="font-mono text-[10px] uppercase tracking-[0.1em] text-on-surface-variant">System Status: Standby</span>
</div>
</div>
</main>
<!-- BottomNavBar Component (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4 bg-[#fff8f4]/80 dark:bg-[#1f1b17]/80 backdrop-blur-md z-50 shadow-[0_-8px_24px_-10px_rgba(31,27,23,0.08)] border-t border-[#e1bfb4]/15">
<!-- Active Tab: Jobs -->
<a class="flex flex-col items-center justify-center text-[#e85d26] after:content-[''] after:w-1 after:h-1 after:bg-[#e85d26] after:rounded-full after:mt-1 active:scale-[0.95] transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="assignment" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-mono text-[10px] uppercase mt-1">Jobs</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1f1b17]/60 dark:text-[#fff8f4]/60 hover:text-[#e85d26] transition-all active:scale-[0.95]" href="#">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
<span class="font-mono text-[10px] uppercase mt-1">Readings</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1f1b17]/60 dark:text-[#fff8f4]/60 hover:text-[#e85d26] transition-all active:scale-[0.95]" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-mono text-[10px] uppercase mt-1">Team</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1f1b17]/60 dark:text-[#fff8f4]/60 hover:text-[#e85d26] transition-all active:scale-[0.95]" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-mono text-[10px] uppercase mt-1">Settings</span>
</a>
</nav>
<!-- FAB (Suppressed on empty state per rules as the main CTA is present in center) -->
</body></html>
