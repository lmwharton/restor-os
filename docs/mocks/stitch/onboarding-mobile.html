<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

              "surface-container": "#f5ece6",

              "secondary-fixed-dim": "#ffb59c",

              "primary-fixed-dim": "#ffb59c",

              "surface": "#fff8f4",

              "on-tertiary-fixed": "#001e2f",

<style>
        body {
            font-family: 'Geist Sans', sans-serif;
            background-color: #fff8f4;
            color: #1f1b17;
        }
        .geist-mono {
            font-family: 'Geist Mono', monospace;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #a63500 0%, #cc4911 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col">
<!-- Header / TopAppBar Mockup (Based on Shared Components JSON) -->
<header class="bg-[#fff8f4]/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#e85d26]" data-icon="water_damage">water_damage</span>
<span class="text-[17px] font-semibold tracking-[-0.45px] text-[#1f1b17] lowercase">crewmatic</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#1f1b17] text-sm font-medium hover:bg-[#fbf2eb] transition-colors px-3 py-2 rounded-lg">Help</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[480px]">
<!-- Content Area - Tonal Layering (Lowest on Container) -->
<div class="bg-surface-container-lowest p-8 sm:p-10 rounded-xl shadow-[0_16px_32px_-12px_rgba(31,27,23,0.05)] border border-outline-variant/10">
<div class="mb-8">
<h1 class="text-[2.75rem] leading-[1.1] font-bold tracking-[-0.04em] text-on-background mb-4">
                        Create your workspace
                    </h1>
<p class="text-on-surface-variant body-lg leading-relaxed">
                        Tell us about your company so we can customize AI scoping for your business.
                    </p>
</div>
<form class="space-y-6">
<!-- Company Name Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-[0.75rem] font-medium uppercase tracking-wider geist-mono text-on-surface-variant" for="company-name">
                                Company name
                            </label>
<span class="text-[10px] geist-mono text-primary font-bold">REQUIRED</span>
</div>
<div class="relative group">
<input class="w-full h-[48px] px-4 bg-surface-container-low border border-outline-variant/20 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40" id="company-name" name="company-name" placeholder="Restoration Pro Services" required="" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-[0.75rem] font-medium uppercase tracking-wider geist-mono text-on-surface-variant" for="phone">
                                Phone number
                            </label>
<span class="text-[10px] geist-mono text-on-surface-variant/40">OPTIONAL</span>
</div>
<div class="relative group">
<input class="w-full h-[48px] px-4 bg-surface-container-low border border-outline-variant/20 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- CTA Section -->
<div class="pt-4">
<button class="w-full h-[56px] primary-gradient text-white font-semibold rounded-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Continue</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-6 text-[11px] geist-mono text-on-surface-variant/60 uppercase tracking-widest">
                            Precision Scoping Powered by Crewmatic AI
                        </p>
</div>
</form>
</div>
<!-- Illustration / Decoration area (subtle) -->
<div class="mt-12 flex justify-center gap-8 opacity-40">
<div class="flex flex-col items-center gap-2">
<div class="p-3 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="precision_manufacturing">precision_manufacturing</span>
</div>
<span class="text-[10px] geist-mono uppercase">Automated</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="p-3 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="analytics">analytics</span>
</div>
<span class="text-[10px] geist-mono uppercase">Data-Driven</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="p-3 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="speed">speed</span>
</div>
<span class="text-[10px] geist-mono uppercase">Field-Fast</span>
</div>
</div>
</div>
</main>
<!-- Visual Anchor / Background Element -->
<div class="fixed bottom-0 right-0 p-12 -z-10 overflow-hidden pointer-events-none">
<div class="w-96 h-96 bg-primary/5 rounded-full blur-3xl absolute -bottom-24 -right-24"></div>
</div>
<!-- Images / Textures for Context -->
<div class="hidden lg:block fixed left-0 top-1/2 -translate-y-1/2 -ml-24 z-0">
<div class="w-64 h-96 rounded-2xl overflow-hidden shadow-2xl rotate-3 border-4 border-white">
<img alt="Restoration technician using professional moisture detection equipment" class="w-full h-full object-cover" data-alt="close-up of a professional handheld moisture meter against a damp wooden wall with a technical orange glow" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHZVrx2TVdoriYRHuvi0kLPTR2GyzOM0327i3E3dI8hTXwGAo5gq-8-ayowLQaNglEoyV4SzDKYIckx6i04PJTh2t8f-HjCRiH7FxN5vT4SopsTWTWBrJWkp1PNlstRHwWFBsVm6k-gGRrJ4h9EbmjY0-HB0xi3OwEk1JRW-MMhHea6BfAuZKosaRf3CAVoHfpYePWf8gjB2rASsRRrrcpFZFwzItlux3iFpoLmtn2Jeh_n4_4IzyLPbYB6MLXhYKFsBxf5GEe-6Q"/>
</div>
</div>
</body></html>
