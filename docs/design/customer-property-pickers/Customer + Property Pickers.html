<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Crewmatic — Customer + Property pickers</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css" />
  <style>
    :root { --font-geist: "Geist", system-ui, sans-serif; }
    body { font-family: var(--font-geist); background: #f5ece6; }
    /* extra picker-specific styling */
    .focus-ring:focus-within { box-shadow: 0 0 0 3px rgba(232, 93, 38, 0.18); border-color: var(--brand) !important; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseDot { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .typing-dot { animation: pulseDot 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="pickers-shared.jsx"></script>
  <script type="text/babel" src="customer-picker.jsx"></script>
  <script type="text/babel" src="property-picker.jsx"></script>
  <script type="text/babel" src="new-job-form.jsx"></script>
  <script type="text/babel" src="pickers-app.jsx"></script>
</body>
</html>
